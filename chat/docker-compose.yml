version: '3.8'

services:
  # 1. 核心数据库 (LobeChat 专属)
  postgresql:
    image: paradedb/paradedb:latest
    container_name: lobechat-postgres
    restart: always
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: lobechat
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./pgdata:/var/lib/postgresql

  # 2. LobeChat 主程序 (已适配 V2 Better Auth 架构)
  lobehub:
    image: lobehub/lobehub:latest
    container_name: lobechat-db-app
    restart: always
    ports:
      - "3210:3210"
    depends_on:
      - postgresql
    env_file:
      - ../.env
    environment:
      APP_URL: https://chat.bitpulse.club
      DATABASE_URL: postgresql://myuser:${POSTGRES_PASSWORD}@postgresql:5432/lobechat

      # --- 核心模型控制 ---
      ENABLED_GOOGLE: "1"
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      DEFAULT_AGENT_CONFIG: model=gemini-flash-latest;provider=google
      OPENAI_MODEL_LIST: -all
      OLLAMA_MODEL_LIST: -all
      ANTHROPIC_MODEL_LIST: -all
      DEEPSEEK_MODEL_LIST: -all
      FAL_MODEL_LIST: -all
      COMFYUI_MODEL_LIST: -all
      GOOGLE_MODEL_LIST: -all,+gemini-3.1-flash-image-preview,+gemini-3-pro-image-preview,+gemini-flash-lite-latest,+gemini-flash-latest,+gemini-pro-latest

      # --- S3 云存储配置 ---
      NEXT_PUBLIC_ENABLE_UPLOAD: "1"
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_BUCKET: bitpulse-lobechat
      S3_ENDPOINT: https://23a561cd4d567a5c14d54d55979aaf5d.r2.cloudflarestorage.com
      S3_PUBLIC_DOMAIN: https://23a561cd4d567a5c14d54d55979aaf5d.r2.cloudflarestorage.com

      # --- 安全与身份验证 (彻底移除旧版 NEXTAUTH_ 变量) ---
      KEY_VAULTS_SECRET: ${KEY_VAULTS_SECRET}
      AUTH_SECRET: ${AUTH_SECRET}
      NEXT_PUBLIC_ENABLE_AUTH: "1"
      ADMIN_EMAILS: ${ADMIN_EMAILS}

      # --- Logto SSO 单点登录配置 ---
      ENABLE_OAUTH_SSO: "1"
      AUTH_SSO_PROVIDERS: logto
      AUTH_DISABLE_EMAIL_PASSWORD: "1"
      
      AUTH_LOGTO_ID: ${AUTH_LOGTO_ID}
      AUTH_LOGTO_SECRET: ${AUTH_LOGTO_SECRET}
      AUTH_LOGTO_ISSUER: https://passport.bitpulse.club/oidc