# 1. 拦截 www 域名并强行重定向到主域名
server {
    listen 80;
    server_name www.bitpulse.club;
    return 301 https://bitpulse.club$request_uri;
}

# 2. 个人科技感导航主页服务
# server {
#     listen 80;
#     server_name bitpulse.club;

#     location / {
#         root /usr/share/nginx/html;
#         index index.html;
#     }
# }

server {
    listen 80;
    server_name bitpulse.club; # 换成你真实的主页域名

    # ==========================================
    # 1. 移交安检权给 4180 端口的保安
    # ==========================================
    location /oauth2/ {
        proxy_pass       http://172.17.0.1:4180;
        proxy_set_header Host                    $host;
        proxy_set_header X-Real-IP               $remote_addr;
        proxy_set_header X-Scheme                $scheme;
    }

    location = /oauth2/auth {
        proxy_pass       http://172.17.0.1:4180;
        proxy_set_header Host             $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Scheme         $scheme;
        proxy_set_header Content-Length   "";
        proxy_pass_request_body           off;
    }

    location /api/me {
        auth_request /oauth2/auth;
        auth_request_set $token $upstream_http_x_auth_request_access_token;
        proxy_set_header Authorization "Bearer $token";
        proxy_set_header Host passport.bitpulse.club;
        
        # 🚨 极其关键的新增项：告诉外网的 HTTPS 服务器，我是合法的客户端
        proxy_ssl_server_name on; 
        
        proxy_pass https://passport.bitpulse.club/oidc/me;
    }

    # ==========================================
    # 3. 处理 401 强制跳转的逻辑
    # ==========================================
    location @error401 {
        return 302 /oauth2/start?rd=$request_uri;
    }

    # ==========================================
    # 2. 核心锁：拦截所有主页访问
    # ==========================================
    location / {
        # 强制查票
        auth_request /oauth2/auth;
        # 没票的直接扔去保安处办理
        error_page 401 = /oauth2/start;

        # ---- 以下保留你原有的主页配置，比如 ----
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    
}




