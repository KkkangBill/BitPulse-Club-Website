# ==========================================
# 1. 流量重定向：统一将 www 重定向到裸域名
# ==========================================
server {
    listen 80;
    server_name www.bitpulse.club;
    return 301 https://bitpulse.club$request_uri;
}

# ==========================================
# 2. 核心主页 (带身份拦截网关)
# ==========================================
server {
    listen 80;
    server_name bitpulse.club; 

    # 1. 保安查票接口
    location = /oauth2/auth {
        proxy_pass       http://172.17.0.1:4180;
        proxy_set_header Host             $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Scheme         $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Content-Length   "";
        proxy_pass_request_body           off;
    }

    # 2. 保安的办事窗口 (登录/登出回调)
    location /oauth2/ {
        proxy_pass       http://172.17.0.1:4180;
        proxy_set_header Host                    $host;
        proxy_set_header X-Real-IP               $remote_addr;
        proxy_set_header X-Scheme                $scheme;
        proxy_set_header X-Auth-Request-Redirect $request_uri;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. 前端获取用户信息的探针隧道
    location /api/me {
        auth_request /oauth2/auth;
        auth_request_set $token $upstream_http_x_auth_request_access_token;
        proxy_set_header Authorization "Bearer $token";
        proxy_set_header Host passport.bitpulse.club;
        proxy_ssl_server_name on; 
        proxy_pass https://passport.bitpulse.club/oidc/me;
    }

    # 4. 401 拦截处理
    location @error401 {
        return 302 /oauth2/start?rd=$request_uri;
    }

    # ==========================================
    # 🌟 新增：静态资源绿色通道 (极其重要，防止死循环重定向)
    # ==========================================
    location ~* \.(png|jpg|jpeg|gif|ico|svg)$ {
        root /usr/share/nginx/html;
        # 这里没有 auth_request，任何人都可以直接访问图片
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # 5. 主页静态文件与拦截锁
    location / {
        auth_request /oauth2/auth;
        error_page 401 = /oauth2/start;
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}

# ==========================================
# 3. LobeChat AI 应用层
# ==========================================
server {
    listen 80;
    server_name chat.bitpulse.club;

    # 1. 核心业务转发
    location / {
        # 注意：这里撤销了 auth_request，让 LobeChat 原生处理登录，解决双重会话冲突
        proxy_pass http://172.17.0.1:3210;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2. 身份洗牌通道 (主站退出的连环节点)
    location = /sso-kill {
        add_header Set-Cookie "better-auth.session_token=; Path=/; Max-Age=0; Expires=Thu, 01 Jan 1970 00:00:00 GMT;" always;
        add_header Set-Cookie "next-auth.session-token=; Path=/; Max-Age=0; Expires=Thu, 01 Jan 1970 00:00:00 GMT;" always;
        add_header Set-Cookie "__Secure-better-auth.session_token=; Path=/; Max-Age=0; Expires=Thu, 01 Jan 1970 00:00:00 GMT; Secure" always;
        add_header Set-Cookie "__Secure-next-auth.session-token=; Path=/; Max-Age=0; Expires=Thu, 01 Jan 1970 00:00:00 GMT; Secure" always;
        add_header Set-Cookie "__Host-better-auth.session_token=; Path=/; Max-Age=0; Expires=Thu, 01 Jan 1970 00:00:00 GMT; Secure" always;

        set $next_jump "https://bitpulse.club"; 
        if ($arg_rd) {
            set $next_jump $arg_rd;
        }
        return 302 $next_jump;
    }
}

# ==========================================
# 4. Alist 私人云网盘 (NAS)
# ==========================================
server {
    listen 80;
    server_name pan.bitpulse.club;

    location / {
        proxy_pass http://172.17.0.1:5244;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 5000m; # 允许大文件上传
    }
}

# ==========================================
# 5. 云端极客沙盒 (IDE)
# ==========================================
server {
    listen 80;
    server_name code.bitpulse.club;

    location / {
        proxy_pass http://172.17.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ==========================================
# 6. Logto SSO 中心 (核心与后台)
# ==========================================
server {
    listen 80;
    server_name passport.bitpulse.club;

    location / {
        proxy_pass http://172.17.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https; 
    }
}

server {
    listen 80;
    server_name admin-passport.bitpulse.club;

    location / {
        proxy_pass http://172.17.0.1:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }
}