<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云端极客沙盒 - BitPulse</title>
    <link rel="icon" type="image/png" href="https://bitpulse.club/bitpulselogo(circle).png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d0e12; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-gray-200 h-screen flex flex-col font-sans overflow-hidden">
    <header class="w-full px-6 py-3 border-b border-gray-800 flex justify-between items-center bg-gray-900/80 backdrop-blur-md">
        <div class="flex items-center space-x-2">
            <h1 class="text-lg font-bold tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400 font-mono">
                BITPULSE CODE PLAYGROUND
            </h1>
        </div>
        <div class="text-xs text-gray-500 flex items-center font-mono">
            <span class="w-2 h-2 rounded-full bg-emerald-500 mr-2 animate-pulse shadow-[0_0_8px_rgba(16,185,129,0.8)]"></span>
            沙盒环境已隔离 · 任何人可用
        </div>
    </header>

    <main class="flex-grow w-full relative">
        <iframe 
            src="https://stackblitz.com/edit/web-platform?embed=1&file=index.html&theme=dark"
            class="absolute inset-0 w-full h-full border-0"
            allow="accelerometer; camera; encrypted-media; geolocation; gyroscope; microphone; midi; clipboard-write"
            sandbox="allow-forms allow-modals allow-popups allow-presentation allow-same-origin allow-scripts"
        ></iframe>
    </main>
</body>
</html>
