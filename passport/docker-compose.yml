version: "3.8"

services:
  # 1. 保安专用轻量缓存数据库
  redis:
    image: redis:alpine
    container_name: bitpulse-redis
    restart: always

  # 2. 核心数据库 (Logto 专属)
  postgres:
    image: postgres:14
    container_name: logto_postgres
    restart: always
    env_file:
      - ../.env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ./logto_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 3. 统一身份认证中心 (Logto Core)
  logto:
    image: ghcr.io/logto-io/logto:latest
    container_name: logto
    restart: always
    ports:
      - "3001:3001"
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      - TRUST_PROXY_HEADER=true
      - DB_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - ENDPOINT=${LOGTO_ENDPOINT}
      - ADMIN_ENDPOINT=${LOGTO_ADMIN_ENDPOINT}
      - OIDC_COOKIE_KEYS=${LOGTO_OIDC_COOKIE_KEYS}
    entrypoint: ["sh", "-c", "npm run cli db seed -- --swe && npm start"]

  # 4. 前线保安网关 (保护主页静态页面与通行证闭环)
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:latest
    container_name: bitpulse-guard
    restart: always
    ports:
      - "4180:4180"
    depends_on:
      - redis
    env_file:
      - ../.env
    environment:
      OAUTH2_PROXY_HTTP_ADDRESS: "0.0.0.0:4180"
      OAUTH2_PROXY_PROVIDER: oidc
      OAUTH2_PROXY_CLIENT_ID: ${GUARD_CLIENT_ID}
      OAUTH2_PROXY_CLIENT_SECRET: ${GUARD_CLIENT_SECRET}
      OAUTH2_PROXY_OIDC_ISSUER_URL: "https://passport.bitpulse.club/oidc"
      OAUTH2_PROXY_SCOPE: "openid email profile"
      OAUTH2_PROXY_PASS_ACCESS_TOKEN: "true"
      OAUTH2_PROXY_SET_XAUTHREQUEST: "true"
      OAUTH2_PROXY_SESSION_STORE_TYPE: "redis"
      OAUTH2_PROXY_REDIS_CONNECTION_URL: "redis://redis:6379"
      OAUTH2_PROXY_REDIRECT_URL: "https://bitpulse.club/oauth2/callback" 
      OAUTH2_PROXY_COOKIE_DOMAINS: ".bitpulse.club"
      OAUTH2_PROXY_WHITELIST_DOMAINS: ".bitpulse.club,passport.bitpulse.club"
      OAUTH2_PROXY_EMAIL_DOMAINS: "*"
      OAUTH2_PROXY_COOKIE_SECRET: ${GUARD_COOKIE_SECRET}
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "true"