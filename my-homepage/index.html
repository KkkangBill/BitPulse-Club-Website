    <div id="maintenance-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="bg-gray-950 border border-amber-500/30 rounded-2xl p-6 max-w-sm w-full text-center shadow-2xl transform scale-95 transition-transform duration-300 shadow-amber-500/5" id="modal-box">
            <div class="w-12 h-12 bg-amber-500/10 text-amber-400 rounded-full flex items-center justify-center mx-auto mb-4 animate-pulse">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            </div>
            <h3 class="text-xl font-bold text-gray-100 mb-2" id="modal-title">系统维护中</h3>
            <p class="text-gray-400 text-sm mb-6 leading-relaxed">抱歉，<span id="site-name" class="text-amber-400 font-bold"></span> 正在进行内核演进与节点维护，暂时无法访问。</p>
            <button onclick="closeMaintenanceAlert()" class="w-full py-2.5 bg-gradient-to-r from-amber-500 to-orange-500 hover:from-amber-600 hover:to-orange-600 text-gray-950 font-bold rounded-xl transition-all duration-200 active:scale-95 shadow-lg shadow-amber-500/10">
                我知道了
            </button>
        </div>
    </div>

    <script>
        function showMaintenanceAlert(siteName) {
            const modal = document.getElementById('maintenance-modal');
            const box = document.getElementById('modal-box');
            document.getElementById('site-name').innerText = siteName;
            
            modal.classList.remove('opacity-0', 'pointer-events-none');
            box.classList.remove('scale-95');
            box.classList.add('scale-100');
        }

        function closeMaintenanceAlert() {
            const modal = document.getElementById('maintenance-modal');
            const box = document.getElementById('modal-box');
            
            modal.classList.add('opacity-0', 'pointer-events-none');
            box.classList.remove('scale-100');
            box.classList.add('scale-95');
        }
    </script>
