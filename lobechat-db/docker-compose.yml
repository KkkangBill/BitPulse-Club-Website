services:
  # 1. 你的核心数据库（保持原样，极其稳定）
  postgresql:
    image: paradedb/paradedb:latest
    container_name: lobechat-postgres
    restart: always
    environment:
      POSTGRES_DB: lobechat
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: bitpulse
    volumes:
      - ./pgdata:/var/lib/postgresql

  # 2. 【终极代替】用完全开源、100%全放通跨域的本地轻量化 WebDAV/S3 桥接器替换 MinIO
  lobechat-minio:
    image: rclone/rclone:latest
    container_name: lobechat-minio
    restart: always
    ports:
      - "9000:9000"
    volumes:
      - ./minio_data:/data
    command: rcd --rc-addr :9000 --rc-no-auth --rc-serve --rc-files /data

  # 3. LobeChat 主程序
  lobehub:
    image: lobehub/lobehub:latest
    container_name: lobechat-db-app
    restart: always
    ports:
      - "3210:3210"
    depends_on:
      - postgresql
      - lobechat-minio
    environment:
      APP_URL: https://chat.bitpulse.club
      DATABASE_URL: postgresql://myuser:bitpulse@postgresql:5432/lobechat

      # --- 谷歌 Gemini 核心密钥配置 ---
      GEMINI_API_KEY: AIzaSyCjTbeGpYyva-w7hDza6ASqLjK7My6XXI8
      GOOGLE_API_KEY: AIzaSyCjTbeGpYyva-w7hDza6ASqLjK7My6XXI8
      ENABLED_GOOGLE: "true"

      # --- 默认模型与模型列表过滤 ---
      DEFAULT_AGENT_CONFIG: model=gemini-1.5-flash;provider=google
      OPENAI_MODEL_LIST: -all
      OLLAMA_MODEL_LIST: -all
      ANTHROPIC_MODEL_LIST: -all
      DEEPSEEK_MODEL_LIST: -all
      FAL_MODEL_LIST: -all
      COMFYUI_MODEL_LIST: -all
      GOOGLE_MODEL_LIST: -all,+gemini-1.5-flash,+gemini-3.1-flash-lite,+gemini-3.1-pro-preview,+gemini-3-flash-preview,+gemini-3.1-flash-image-preview,+gemini-3-pro-image-preview

